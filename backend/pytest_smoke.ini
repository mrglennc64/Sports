[pytest]
# Pytest configuration for smoke tests

# Test discovery
testpaths = tests
pythonpath = .
python_files = test_smoke_*.py
python_classes = Test*
python_functions = test_*

# Output and reporting
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --junit-xml=test-results/smoke-tests.xml
    --html=test-results/smoke-tests.html
    --self-contained-html
    --cov=app
    --cov-report=html:test-results/coverage
    --cov-report=term-missing
    --timeout=300

# Markers for categorizing tests
markers =
    smoke: smoke tests for production deployment
    verticals: tests for vertical endpoints
    portfolio: tests for portfolio engine
    clv: tests for CLV endpoints
    health: tests for health check
    database: tests for database operations
    frontend: tests for frontend integration
    slow: slow tests
    integration: integration tests
    error_handling: error handling tests

# Logging
log_cli = false
log_cli_level = INFO
log_file = test-results/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Asyncio mode for async tests
asyncio_mode = auto

# Timeout for tests (in seconds)
timeout = 300

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum python version
minversion = 6.0

# Test collection
python_functions = test_*
python_classes = Test*

# Traceback style
tb = short

# Show extra info
verbosity = 2

# Continue on collection errors
# try:
#     continue = true
