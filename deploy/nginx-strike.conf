# nginx site for strike.perfecthold.online
# Serves the built React frontend and reverse-proxies /api/* to the FastAPI service.
# certbot will add the TLS (443) server block automatically.
server {
    listen 80;
    server_name strike.perfecthold.online;

    root /opt/strike/frontend/dist;
    index index.html;

    # /api/slate -> http://127.0.0.1:8000/slate  (trailing slash strips the /api prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: let React Router handle client-side routes (e.g. /app)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
